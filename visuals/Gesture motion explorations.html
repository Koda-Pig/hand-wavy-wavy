<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gesture motion · explorations</title>
<style>
  :root {
    --bg:        #07080b;
    --bg-grid:   rgba(255,255,255,0.025);
    --ink:       #e7e7ea;
    --ink-soft:  rgba(231,231,234,0.55);
    --ink-faint: rgba(231,231,234,0.32);
    --edge:      rgba(255,255,255,0.06);
    --edge-2:    rgba(255,255,255,0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink);
    font: 13px/1.55 ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased; }

  .page { min-height: 100vh; padding: 36px 40px 80px; max-width: 1240px; margin: 0 auto; position: relative; }
  .page[data-bggrid="1"]::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(to right, var(--bg-grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--bg-grid) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
  }
  .page > * { position: relative; z-index: 1; }

  .hd { display: flex; align-items: flex-end; justify-content: space-between;
    gap: 24px; margin-bottom: 32px; padding-bottom: 18px;
    border-bottom: 1px solid var(--edge); }
  .hd h1 { margin: 0 0 6px; font: 500 15px/1.3 ui-sans-serif, system-ui, sans-serif;
    letter-spacing: 0.01em; }
  .hd p  { margin: 0; color: var(--ink-soft); max-width: 560px;
    font: 13px/1.55 ui-sans-serif, system-ui, sans-serif; text-wrap: pretty; }
  .hd-r { color: var(--ink-faint); font: 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    text-transform: uppercase; letter-spacing: 0.12em; display: inline-flex; align-items: center; gap: 8px; }
  .hd-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #7df0d1; box-shadow: 0 0 8px #7df0d1; animation: blink 2.4s ease-in-out infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  .grid { display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 28px 32px;
    justify-items: center; }

  .tile { margin: 0; display: flex; flex-direction: column; gap: 10px; width: 280px; }
  .tile-frame {
    position: relative; width: 280px; height: 440px;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
    box-shadow:
      inset 0 0 0 1px var(--edge-2),
      0 1px 0 rgba(255,255,255,0.04),
      0 20px 60px -30px rgba(0,0,0,0.8);
  }
  .tile-frame canvas { display: block; width: 100%; height: 100%; }
  .tile-vignette {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(120% 90% at 50% 50%, transparent 55%, rgba(0,0,0,0.6) 100%),
      linear-gradient(to bottom, rgba(255,255,255,0.02), transparent 30%, transparent 70%, rgba(255,255,255,0.015));
  }
  .tile-cap { display: flex; align-items: baseline; justify-content: space-between;
    gap: 14px; padding: 0 2px; }
  .tile-name { font: 500 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: 0.04em; color: var(--ink); }
  .tile-desc { font: 11px/1 ui-sans-serif, system-ui, sans-serif;
    color: var(--ink-faint); text-align: right; }

  @media (max-width: 1100px) {
    .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 760px) {
    .page { padding: 24px 18px 60px; }
    .grid { grid-template-columns: 1fr; gap: 22px; }
    .hd { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="gestures.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
